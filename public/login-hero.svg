<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 120" fill="none" aria-hidden="true">
  <defs>
    <linearGradient id="loginHeroStroke" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5eead4" stop-opacity="0.95"/>
      <stop offset="55%" stop-color="#4fd1c5" stop-opacity="0.75"/>
      <stop offset="100%" stop-color="#c084fc" stop-opacity="0.85"/>
    </linearGradient>
    <linearGradient id="loginHeroFill" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#1e293b" stop-opacity="0.55"/>
    </linearGradient>
    <filter id="loginHeroGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge>
        <feMergeNode in="b"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <!-- terminal / console -->
  <rect x="24" y="28" width="132" height="72" rx="10" fill="url(#loginHeroFill)" stroke="url(#loginHeroStroke)" stroke-width="1.5" filter="url(#loginHeroGlow)"/>
  <rect x="36" y="42" width="108" height="8" rx="2" fill="#4fd1c5" opacity="0.35"/>
  <rect x="36" y="56" width="72" height="6" rx="2" fill="#94a3b8" opacity="0.25"/>
  <rect x="36" y="68" width="92" height="6" rx="2" fill="#94a3b8" opacity="0.2"/>
  <circle cx="132" cy="86" r="5" fill="#4ade80" opacity="0.85"/>
  <!-- plate -->
  <ellipse cx="258" cy="72" rx="52" ry="18" stroke="url(#loginHeroStroke)" stroke-width="1.25" opacity="0.7"/>
  <ellipse cx="258" cy="68" rx="38" ry="12" fill="url(#loginHeroFill)" stroke="url(#loginHeroStroke)" stroke-width="1" opacity="0.85"/>
  <path d="M230 58c12-18 52-18 56 0" stroke="url(#loginHeroStroke)" stroke-width="1.2" stroke-linecap="round" opacity="0.55"/>
  <!-- steam -->
  <path d="M248 34c6 8 2 16-2 22M268 30c8 10 2 20-2 26M288 36c5 9 0 18-4 24" stroke="#5eead4" stroke-width="1.5" stroke-linecap="round" opacity="0.45"/>
</svg>
